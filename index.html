<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Math Kingdom</title>

<style>
body{
    font-family:Arial;
    background:#87CEEB;
    margin:0;
    text-align:center;
}

h1{
    background:#4CAF50;
    color:white;
    padding:15px;
    margin:0;
}

#game{
    width:900px;
    margin:auto;
    padding:20px;
}

#village{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px 0;
}

.building{
    width:120px;
    height:120px;
    border:3px solid #555;
    border-radius:10px;
    background:#ddd;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
}

.built{
    background:#8BC34A;
    color:white;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

input{
    width:80px;
    font-size:22px;
    text-align:center;
}

#question{
    font-size:28px;
    margin:20px;
}

#info{
    font-size:22px;
}
</style>

</head>
<body>

<h1>🏰 Math Kingdom Adventure</h1>

<div id="game">

<div id="info">
🪙 Koin :
<span id="coin">0</span>
</div>

<div id="question"></div>

<input id="answer">

<button onclick="cek()">Jawab</button>

<hr>

<button onclick="build('rumah',20)">Bangun Rumah (20)</button>

<button onclick="build('sekolah',40)">Bangun Sekolah (40)</button>

<button onclick="build('istana',60)">Bangun Istana (60)</button>

<div id="village">

<div class="building" id="rumah">
🏚️
</div>

<div class="building" id="sekolah">
📚
</div>

<div class="building" id="istana">
🏰
</div>

</div>

<h2 id="pesan"></h2>

</div>

<script>

let coin=0;

let a,b,jawab;

function soal(){

a=Math.floor(Math.random()*10)+1;

b=Math.floor(Math.random()*10)+1;

jawab=a+b;

document.getElementById("question").innerHTML=
"Soal : "+a+" + "+b+" = ?";

answer.value="";

}

soal();

function cek(){

if(Number(answer.value)==jawab){

coin+=10;

pesan.innerHTML="✅ Benar! +10 Koin";

}else{

pesan.innerHTML="❌ Salah";

}

coin.innerHTML=coin;

document.getElementById("coin").innerHTML=coin;

soal();

}

function build(id,harga){

if(coin>=harga){

coin-=harga;

document.getElementById("coin").innerHTML=coin;

let b=document.getElementById(id);

b.classList.add("built");

if(id=="rumah")
b.innerHTML="🏠";

if(id=="sekolah")
b.innerHTML="🏫";

if(id=="istana")
b.innerHTML="🏯";

pesan.innerHTML="🎉 "+id+" berhasil dibangun!";

}else{

pesan.innerHTML="🪙 Koin belum cukup.";

}

}

</script>

</body>
</html>
